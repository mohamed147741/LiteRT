
name: "linux nightly wheel arm64 qemu compatibility"

on:
  puch:
  branches:
    -main
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      build_converter:
        description: 'When true, build the converter into the wheels.'
        required: true
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-nightly
  cancel-in-progress: true

jobs:
  build_wheels:
    name: "Build Wheels - arm64 (QEMU) - Python ${{ matrix.python-version }}"
    # استخدام البيئة الافتراضية للحسابات المجانية
    runs-on: ubuntu-latest 
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      # إعداد QEMU لمحاكاة معمارية arm64 على بيئة x86_64
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up cache keys
        id: cache-keys
        shell: bash
        run: |
          CACHE_MONTH=$(TZ='America/Los_Angeles' date +%Y-%m)
          echo "CACHE_KEY=${{ github.workflow }}-qemu-arm64-${{ matrix.python-version }}-$CACHE_MONTH-${{ github.sha }}" >> "$GITHUB_OUTPUT"
          echo "BAZEL_OUTPUT_BASE=${HOME}/bazel-output-bases/w-qemu-arm64" >> "$GITHUB_ENV"

      - name: Build and generate wheel
        env:
          DOCKER_PYTHON_VERSION: ${{ matrix.python-version }}
          # الأعلام أدناه تعطل LSE وتجبر المترجم على استخدام v8-a الأساسية المتوافقة مع Oppo A57s
          CUSTOM_BAZEL_FLAGS: >-
            --config=release_cpu_linux 
            --copt=-mno-outline-atomics 
            --linkopt=-mno-outline-atomics 
            --copt=-march=armv8-a 
            --linkopt=-march=armv8-a
          USE_LOCAL_TF: "false"
          TEST_MANYLINUX_COMPLIANCE: "true"
          BUILD_CONVERTER: ${{ inputs.build_converter }}
        run: |
          export NIGHTLY_RELEASE_DATE=$(TZ='America/Los_Angeles' date +%Y%m%d)
          chmod +x ci/build_pip_package_with_docker.sh
          # السكربت سيعمل الآن داخل حاوية arm64 بفضل QEMU
          ./ci/build_pip_package_with_docker.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lite-rt-oppo-a57s-compat-py${{ matrix.python-version }}
          path: |
            dist/*.whl
            dist/*.tar.gz
          retention-days: 7
