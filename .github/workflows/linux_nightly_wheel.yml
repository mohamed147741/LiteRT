name: "linux nightly wheel arm64 qemu compatibility (Python 3.12)"

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      build_converter:
        description: 'When true, build the converter into the wheels.'
        required: true
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-nightly
  cancel-in-progress: true

jobs:
  build_wheels:
    name: "Build Wheels - arm64 (QEMU) - Python 3.12"
    runs-on: ubuntu-latest

    steps:  
      - name: Checkout code  
        uses: actions/checkout@v4  
        with:  
          submodules: 'recursive'  

      - name: Set up QEMU  
        uses: docker/setup-qemu-action@v3  
        with:  
          platforms: arm64  

      - name: Set up Docker Buildx  
        uses: docker/setup-buildx-action@v3  

      - name: Build and generate wheel  
        env:  
          DOCKER_PYTHON_VERSION: "3.12"
          USE_LOCAL_TF: "false"  
          TEST_MANYLINUX_COMPLIANCE: "true"  
          BUILD_CONVERTER: ${{ inputs.build_converter }}  
          # تم نقل الأعلام إلى سطر التشغيل مباشرة لحمايتها
        run: |  
          export NIGHTLY_RELEASE_DATE=$(TZ='America/Los_Angeles' date +%Y%m%d)
          
          # تعريف الأعلام مع هروب دقيق للمسافات
          FLAGS="--config=release_cpu_linux --copt=-mno-outline-atomics --linkopt=-mno-outline-atomics --copt=-march=armv8-a --linkopt=-march=armv8-a"
          
          chmod +x ci/build_pip_package_with_docker.sh
          
          # التشغيل مع إجبار الصدفة على اعتبار FLAGS نصاً واحداً
          CUSTOM_BAZEL_FLAGS="$FLAGS" ./ci/build_pip_package_with_docker.sh  

      - name: Upload artifacts  
        uses: actions/upload-artifact@v4  
        with:  
          name: lite-rt-oppo-a57s-compat-py3.12  
          path: |  
            dist/*.whl  
            dist/*.tar.gz  
          retention-days: 7
