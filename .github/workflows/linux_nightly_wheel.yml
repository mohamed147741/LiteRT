name: "linux nightly wheel arm64 qemu compatibility (Python 3.12)"

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      build_converter:
        description: 'When true, build the converter into the wheels.'
        required: true
        default: false
        type: boolean

jobs:
  build_wheels:
    name: "Build Wheels - arm64 (QEMU) - Python 3.12"
    runs-on: ubuntu-latest

    steps:  
      - name: Checkout code  
        uses: actions/checkout@v4  
        with:  
          submodules: 'recursive'  

      - name: Set up QEMU  
        uses: docker/setup-qemu-action@v3  
        with:  
          platforms: arm64  

      - name: Set up Docker Buildx  
        uses: docker/setup-buildx-action@v3  

      - name: Build and generate wheel  
        run: |  
          export NIGHTLY_RELEASE_DATE=$(TZ='America/Los_Angeles' date +%Y%m%d)
          
          # الحل النهائي: وضع الأعلام في ملف bazelrc مؤقت بدلاً من تمريرها كـ Flags
          # هذا يضمن أن Docker لن يرى المسافات أو علامات --copt إطلاقاً
          
          cat <<EOF > custom_flags.bazelrc
          build --config=release_cpu_linux
          build --copt=-mno-outline-atomics
          build --linkopt=-mno-outline-atomics
          build --copt=-march=armv8-a
          build --linkopt=-march=armv8-a
          EOF

          chmod +x ci/build_pip_package_with_docker.sh
          
          # نقوم بتمرير مسار الملف إلى السكريبت
          # السكريبت داخلياً سيقرأ المتغير CUSTOM_BAZEL_FLAGS 
          # سنقوم بخدعة بسيطة: نمرر العلم --bazelrc ليقرأ الأعلام من ملفنا
          
          export DOCKER_PYTHON_VERSION="3.12"
          export USE_LOCAL_TF="false"
          export TEST_MANYLINUX_COMPLIANCE="true"
          export BUILD_CONVERTER="${{ inputs.build_converter }}"
          export CUSTOM_BAZEL_FLAGS="--bazelrc=/root_dir/custom_flags.bazelrc"

          ./ci/build_pip_package_with_docker.sh  

      - name: Upload artifacts  
        uses: actions/upload-artifact@v4  
        with:  
          name: lite-rt-oppo-a57s-compat-py3.12  
          path: |  
            dist/*.whl  
            dist/*.tar.gz  
          retention-days: 7
