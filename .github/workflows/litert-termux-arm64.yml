
name: Build LiteRT ARM64 Termux

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-arm64-termux:
    runs-on: ubuntu-latest
    steps:
      # 1️⃣ جلب الكود
      - uses: actions/checkout@v3

      # 2️⃣ إعداد QEMU لتشغيل ARM Docker على x86 runner
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 3️⃣ تشغيل Docker Termux ARM64 مع تحديث mirrors
      - name: Run Termux ARM64 Docker
        run: |
          docker pull termux/termux-docker:aarch64

          docker run -it --platform linux/arm64 termux/termux-docker:aarch64 bash\
            -v $GITHUB_WORKSPACE:/workspace \
            -w /workspace \
            termux/termux-docker:aarch64 /bin/bash -c "
              set -e

              echo '### تحديث Termux mirrors ###'
              # تحديث الـ mirrors إلى mirror صالح عالمي
              sed -i 's|https://packages-cf.termux.dev/apt/termux-main|https://packages.termux.org/apt/termux-main|g' $PREFIX/etc/apt/sources.list
              pkg update -y

              echo '### تثبيت الأدوات الأساسية ###'
              pkg install -y git wget curl unzip openjdk-17

              echo '### إضافة TUR repo ###'
              # ضع هنا رابط السكربت الرسمي أو طريقة TUR لإضافة repo
              # مثال (غير مفعل حاليا):
              # wget https://example.com/tur-repo/install.sh
              # bash install.sh
              pkg install -y tur
              echo '### تثبيت Bazel 7.7.0 من TUR repo ###'
              # مثال:
              pkg install -y bazel7
              ln -s $PREFIX/bin/bazel-7.7.1 $PREFIX/bazel 
              bazel version || echo 'تحقق من اسم الحزمة في TUR repo'

              echo '### بناء LiteRT مع تخطي الأهداف الفاشلة ###'
              bazel build //... --keep_going
            "
