name: Build LiteRT ARM64 Termux

on:
  push:
    branches: [main]

jobs:
  build-arm64-termux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Run Termux Docker
        run: |
          docker pull termux/termux-docker:aarch64
          docker run --rm -t \
            --platform linux/arm64 \
            -v $GITHUB_WORKSPACE:/workspace \
            -w /workspace \
            termux/termux-docker:aarch64 /bin/bash -c "
              pkg update -y
              pkg install -y wget git curl
              
              # إضافة TUR repo
              wget https://example.com/tur-repo/install.sh
              bash install.sh
              
              # تثبيت Bazel 7
              pkg install -y bazel-7.7.0
              bazel version
              
              # بناء LiteRT
              bazel build //:litert
            "
